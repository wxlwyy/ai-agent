spring:
  application:
    name: ai-agent-backend
  profiles:
    active: local
server:
  port: 8081
  servlet:
    context-path: /api
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.wxl.agent.controller
# knife4j的增强配置，不需要增强可以不配， http://localhost:8081/api/doc.html
knife4j:
  enable: true
  setting:
    language: zh_cn