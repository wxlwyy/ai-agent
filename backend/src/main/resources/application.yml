spring:
  application:
    name: ai-agent-backend
  profiles:
    active: local
  datasource: # 数据库配置
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_agent
    password: 123456
    username: root  #这里一定要注意不是name（数据源名称）而是username！！！
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
server:
  port: 8081
  servlet:
    context-path: /api
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.wxl.agent.controller
# knife4j的增强配置，不需要增强可以不配， http://localhost:8081/api/doc.html
knife4j:
  enable: true
  setting:
    language: zh_cn